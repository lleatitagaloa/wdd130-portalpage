<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: rgb(120, 96, 64);
            display: flex;
            justify-content: center;
            padding: 30px;
            font-family: Arial, Helvetica, sans-serif;
        }
        #formContainer {
            position: relative;
            width: 900px;
            background: white;
            border: 14px solid navy;
            border-radius: 40px;
            overflow: hidden;
        }
        #hero {
            position: relative;
        }
        #hero h1 {
            position: absolute;
            top: 180px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 4rem;
            text-shadow: 4px 4px 6px rgba(0,0,0,0.8);
        }
        #hero h2 {
            position: absolute;
            top: 260px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 3rem;
            text-shadow: 4px 4px 6px rgba(0,0,0,0.8);
        }
        #hero-img {
            display: block;
            width: 100%;
            height: 400px;
            object-fit: cover;
            object-position: top;
        }
        #closeBtn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            font-size: 1.5rem;
        }
        #title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 25px 0;
        }
        #myForm {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 25px 20px;
            padding: 20px 60px 40px;
            align-items: center;
        }
        #myForm > label {
            font-size: 2rem;
        }
        input[type="text"], input[type="password"], input[type="email"] {
            height: 45px;
            width: 100%;
            font-size: 1.1rem;
        }
        input[type="radio"], input[type="checkbox"] {
            transform: scale(1.6);
        }
        #myForm div {
            display: flex;
            gap: 20px;
        }
        #myForm section {
            grid-column: 1 / 3;
            text-align: center;
            font-size: 1.5rem;
        }
        #myForm section label {
            margin-left: 10px;
        }
        #myForm button[type="submit"] {
            padding: 10px 30px;
            font-size: 1.2rem;
        }
        #standard_works {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            background: white;
        }
        #standard_works img {
            width: 100%;
            display: block;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        #standard_works img:hover {
            transform: scale(1.05);
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div id="formContainer">
        <div id="hero">
            <img id="hero-img" src="images/jesus_feeds_5000.jpeg" alt="Jesus feeds 5000">
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
        <div id="form">
            <h3 id="title">Sign Up for Daily Scripture Feed</h3>
            <button type="button" id="closeBtn">X</button>
            <form id="myForm">
                <label for="username">User Name:</label>
                <input type="text" id="username" name="username" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label>Gender:</label>
                <div>
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female" required>
                    <label for="female">Female</label>
                </div>

                <section>
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Subscribe to newsletter</label>
                </section>

                <section>
                    <input type="checkbox" id="conditions" name="conditions" required>
                    <label for="conditions">I acknowledge the terms and conditions</label>
                </section>

                <section>
                    <button type="submit">Submit</button>
                </section>
            </form>
        </div>
        <div id="standard_works">
            <a href="https://www.churchofjesuschrist.org/study/scriptures/ot?lang=eng" target="_blank"><img src="images/old_testament.webp" alt="Old Testament"></a>
            <a href="https://www.churchofjesuschrist.org/study/scriptures/nt?lang=eng" target="_blank"><img src="images/new_testament.webp" alt="New Testament"></a>
            <a href="https://www.churchofjesuschrist.org/study/scriptures/bofm?lang=eng" target="_blank"><img src="images/book_of_mormon.webp" alt="Book of Mormon"></a>
            <a href="https://www.churchofjesuschrist.org/study/scriptures/dc-testament?lang=eng" target="_blank"><img src="images/doctrine_and_covenants.webp" alt="Doctrine & Covenants"></a>
            <a href="https://www.churchofjesuschrist.org/study/scriptures/pgp?lang=eng" target="_blank"><img src="images/pearl_of_great_price.webp" alt="Pearl of Great Price"></a>
        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
