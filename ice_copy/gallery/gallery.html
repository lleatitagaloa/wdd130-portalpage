<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images of Christ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ballet:opsz@16..72&display=swap');

        body {
            background: black;
        }
        #wrapper{
            width: 600px;
            margin: 0 auto;
        }
        nav {
            color: white;
            text-align: center;
            /*font-family: Haettenschweiler, 'Arial Narrow Bold', sans-serif;*/
            font-family: Ballet, cursive;
            font-size: 2.5rem;
            letter-spacing: 3px;
        }
        #gallery{
            display: grid;
            grid-template-columns: 200px 200px 200px;
            border: 15px solid rgb(255, 255, 255);
            width: 100%;
            background-color: #ddd;
            background-image:
                linear-gradient(45deg, #ccc 26%, transparent 26%), 
                linear-gradient(135deg, #ccc 26%, transparent 26%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(135deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px; /* Must be a square */
            background-position: 0 0, 10px                                               0, 10px -10px, 0px 10px; 
            
        }
        #gallery a {
            cursor: url('images/christus.png'), pointer;
        }
        #gallery img {
            /* make a thumbnail of the image that is 200x300 
               instead of using width and height here to help the page load faster */
            opacity:50%;
            display:block;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        #gallery img:hover{
            opacity: 100%;
            transform: scale(1.05);
            outline: 3px solid gold;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <nav>
            <h1>Christ Art Gallery</h1>
        </nav>
        <main>
            <div id="gallery">
                <a href="images/big/optimized_img1.jpg"><img src="images/small/thumbnail_img1.jpg" alt="Christ praying with the Nephites" ></a>
                <a href="images/big/optimized_img2.jpg"><img src="images/small/thumbnail_img2.jpg" alt="Jesus the Christ" ></a>
                <a href="images/big/optimized_img3.jpg"><img src="images/small/thumbnail_img3.jpg" alt="Jesus Raising the Daughter of Jairus" ></a>
                <a href="images/big/optimized_img4.jpg"><img src="images/small/thumbnail_img4.jpg" alt="The Lord Appears in the Kirtland Temple" ></a>
                <a href="images/big/optimized_img5.jpg"><img src="images/small/thumbnail_img5.jpg" alt="Crucifixion of Jesus Christ" ></a>
                <a href="images/big/optimized_img6.jpg"><img src="images/small/thumbnail_img6.jpg" alt="Jesus Calms the Storm" ></a>
            </div>
        </main>
    </div>
</body>
</html>
